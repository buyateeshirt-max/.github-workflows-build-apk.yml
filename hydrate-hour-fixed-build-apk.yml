name: Build Hydrate Hour APK - Fixed

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Generate project and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Use Java 17 from runner
        shell: bash
        run: |
          set -e
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_17_X64}/bin" >> "$GITHUB_PATH"
          "${JAVA_HOME_17_X64}/bin/java" -version

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -e
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Generate Hydrate Hour Android project
        shell: bash
        run: |
          set -e

          mkdir -p app/src/main/java/com/example/hydratehour
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "HydrateHour"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "com.example.hydratehour"
              compileSdk 35

              defaultConfig {
                  applicationId "com.example.hydratehour"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="Hydrate Hour"
                  android:icon="@drawable/ic_launcher"
                  android:allowBackup="true"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <receiver
                      android:name=".WaterReminderReceiver"
                      android:exported="false" />

                  <receiver
                      android:name=".BootReceiver"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:statusBarColor">#F7FAFC</item>
                  <item name="android:navigationBarColor">#F7FAFC</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#0EA5E9" android:pathData="M54,6C37,28 24,45 24,64C24,82 37,96 54,96C71,96 84,82 84,64C84,45 71,28 54,6Z"/>
              <path android:fillColor="#E0F2FE" android:pathData="M43,31C36,42 31,53 31,64C31,76 40,86 52,88C43,81 41,72 43,63C45,53 49,44 43,31Z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_water_drop.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path android:fillColor="#0EA5E9" android:pathData="M12,2C8.2,6.8 5,10.9 5,15C5,19.4 8.1,22 12,22C15.9,22 19,19.4 19,15C19,10.9 15.8,6.8 12,2Z"/>
          </vector>
          EOF

          cat > app/src/main/java/com/example/hydratehour/ReminderScheduler.java <<'EOF'
          package com.example.hydratehour;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;

          public final class ReminderScheduler {
              private ReminderScheduler() {}

              public static final String PREFS = "hydrate_hour_prefs";
              public static final String KEY_ENABLED = "reminders_enabled";
              private static final int REQUEST_CODE = 2026;

              public static void schedule(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pendingIntent = reminderIntent(context);
                  long firstReminder = System.currentTimeMillis() + AlarmManager.INTERVAL_HOUR;

                  if (alarmManager != null) {
                      alarmManager.setInexactRepeating(
                              AlarmManager.RTC_WAKEUP,
                              firstReminder,
                              AlarmManager.INTERVAL_HOUR,
                              pendingIntent
                      );
                  }

                  context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .edit()
                          .putBoolean(KEY_ENABLED, true)
                          .apply();
              }

              public static void cancel(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager != null) {
                      alarmManager.cancel(reminderIntent(context));
                  }

                  context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .edit()
                          .putBoolean(KEY_ENABLED, false)
                          .apply();
              }

              public static boolean isEnabled(Context context) {
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .getBoolean(KEY_ENABLED, false);
              }

              private static PendingIntent reminderIntent(Context context) {
                  Intent intent = new Intent(context, WaterReminderReceiver.class);
                  return PendingIntent.getBroadcast(
                          context,
                          REQUEST_CODE,
                          intent,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );
              }
          }
          EOF

          cat > app/src/main/java/com/example/hydratehour/WaterReminderReceiver.java <<'EOF'
          package com.example.hydratehour;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;

          public class WaterReminderReceiver extends BroadcastReceiver {
              public static final String CHANNEL_ID = "hydrate_hour_reminders";

              @Override
              public void onReceive(Context context, Intent intent) {
                  createChannel(context);

                  Intent openApp = new Intent(context, MainActivity.class);
                  openApp.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);

                  PendingIntent contentIntent = PendingIntent.getActivity(
                          context,
                          0,
                          openApp,
                          PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE
                  );

                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new Notification.Builder(context, CHANNEL_ID)
                          : new Notification.Builder(context);

                  Notification notification = builder
                          .setSmallIcon(com.example.hydratehour.R.drawable.ic_water_drop)
                          .setContentTitle("Time to drink water")
                          .setContentText("Take a few sips and keep your body hydrated.")
                          .setContentIntent(contentIntent)
                          .setAutoCancel(true)
                          .setPriority(Notification.PRIORITY_DEFAULT)
                          .build();

                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null) {
                      manager.notify(1001, notification);
                  }
              }

              public static void createChannel(Context context) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                              CHANNEL_ID,
                              "Water reminders",
                              NotificationManager.IMPORTANCE_DEFAULT
                      );
                      channel.setDescription("Hourly reminders to drink water.");

                      NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/example/hydratehour/BootReceiver.java <<'EOF'
          package com.example.hydratehour;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;

          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction()) && ReminderScheduler.isEnabled(context)) {
                      ReminderScheduler.schedule(context);
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/example/hydratehour/MainActivity.java <<'EOF'
          package com.example.hydratehour;

          import android.Manifest;
          import android.app.Activity;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.content.SharedPreferences;

          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final String KEY_COUNT = "daily_count";
              private static final String KEY_DATE = "daily_date";
              private static final int DAILY_GOAL = 8;
              private TextView statusText;
              private TextView countText;
              private ProgressBar progressBar;
              private Button reminderButton;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  prefs = getSharedPreferences(ReminderScheduler.PREFS, MODE_PRIVATE);
                  WaterReminderReceiver.createChannel(this);
                  requestNotificationPermission();
                  resetCountIfNewDay();
                  buildInterface();
                  updateInterface();
              }

              private void requestNotificationPermission() {
                  if (Build.VERSION.SDK_INT >= 33 &&
                          checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 10);
                  }
              }

              private void buildInterface() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.setPadding(dp(22), dp(34), dp(22), dp(24));

                  GradientDrawable background = new GradientDrawable(
                          GradientDrawable.Orientation.TOP_BOTTOM,
                          new int[]{Color.rgb(240, 249, 255), Color.rgb(255, 255, 255)}
                  );
                  root.setBackground(background);

                  TextView icon = new TextView(this);
                  icon.setText("💧");
                  icon.setTextSize(54);
                  icon.setGravity(Gravity.CENTER);
                  root.addView(icon, new LinearLayout.LayoutParams(-1, -2));

                  TextView title = new TextView(this);
                  title.setText("Hydrate Hour");
                  title.setTextSize(31);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setTextColor(Color.rgb(15, 23, 42));
                  title.setGravity(Gravity.CENTER);
                  root.addView(title, new LinearLayout.LayoutParams(-1, -2));

                  TextView subtitle = new TextView(this);
                  subtitle.setText("Gentle hourly reminders to drink water and stay energized.");
                  subtitle.setTextSize(16);
                  subtitle.setTextColor(Color.rgb(71, 85, 105));
                  subtitle.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams subParams = new LinearLayout.LayoutParams(-1, -2);
                  subParams.setMargins(0, dp(10), 0, dp(24));
                  root.addView(subtitle, subParams);

                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setGravity(Gravity.CENTER_HORIZONTAL);
                  card.setPadding(dp(22), dp(22), dp(22), dp(22));

                  GradientDrawable cardBg = new GradientDrawable();
                  cardBg.setColor(Color.WHITE);
                  cardBg.setCornerRadius(dp(24));
                  cardBg.setStroke(dp(1), Color.rgb(226, 232, 240));
                  card.setBackground(cardBg);
                  card.setElevation(dp(4));

                  statusText = new TextView(this);
                  statusText.setTextSize(18);
                  statusText.setTypeface(Typeface.DEFAULT_BOLD);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setTextColor(Color.rgb(15, 23, 42));
                  card.addView(statusText, new LinearLayout.LayoutParams(-1, -2));

                  countText = new TextView(this);
                  countText.setTextSize(42);
                  countText.setTypeface(Typeface.DEFAULT_BOLD);
                  countText.setTextColor(Color.rgb(14, 165, 233));
                  countText.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams countParams = new LinearLayout.LayoutParams(-1, -2);
                  countParams.setMargins(0, dp(14), 0, dp(10));
                  card.addView(countText, countParams);

                  progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  progressBar.setMax(DAILY_GOAL);
                  LinearLayout.LayoutParams progressParams = new LinearLayout.LayoutParams(-1, dp(12));
                  progressParams.setMargins(0, 0, 0, dp(18));
                  card.addView(progressBar, progressParams);

                  Button drinkButton = primaryButton("I drank water");
                  drinkButton.setOnClickListener(v -> {
                      int count = prefs.getInt(KEY_COUNT, 0);
                      prefs.edit()
                              .putInt(KEY_COUNT, count + 1)
                              .putString(KEY_DATE, todayKey())
                              .apply();
                      updateInterface();
                  });
                  card.addView(drinkButton, new LinearLayout.LayoutParams(-1, dp(54)));

                  reminderButton = secondaryButton("Enable hourly reminders");
                  reminderButton.setOnClickListener(v -> {
                      if (ReminderScheduler.isEnabled(this)) {
                          ReminderScheduler.cancel(this);
                      } else {
                          ReminderScheduler.schedule(this);
                      }
                      updateInterface();
                  });
                  LinearLayout.LayoutParams reminderParams = new LinearLayout.LayoutParams(-1, dp(54));
                  reminderParams.setMargins(0, dp(12), 0, 0);
                  card.addView(reminderButton, reminderParams);

                  LinearLayout.LayoutParams cardParams = new LinearLayout.LayoutParams(-1, -2);
                  root.addView(card, cardParams);

                  TextView note = new TextView(this);
                  note.setText("Tip: Android may batch reminders slightly to save battery.");
                  note.setTextSize(13);
                  note.setTextColor(Color.rgb(100, 116, 139));
                  note.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams noteParams = new LinearLayout.LayoutParams(-1, -2);
                  noteParams.setMargins(0, dp(20), 0, 0);
                  root.addView(note, noteParams);

                  setContentView(root);
              }

              private Button primaryButton(String text) {
                  Button button = new Button(this);
                  button.setText(text);
                  button.setTextSize(16);
                  button.setAllCaps(false);
                  button.setTextColor(Color.WHITE);
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.rgb(14, 165, 233));
                  bg.setCornerRadius(dp(16));
                  button.setBackground(bg);
                  return button;
              }

              private Button secondaryButton(String text) {
                  Button button = new Button(this);
                  button.setText(text);
                  button.setTextSize(16);
                  button.setAllCaps(false);
                  button.setTextColor(Color.rgb(14, 116, 144));
                  GradientDrawable bg = new GradientDrawable();
                  bg.setColor(Color.rgb(224, 242, 254));
                  bg.setCornerRadius(dp(16));
                  bg.setStroke(dp(1), Color.rgb(186, 230, 253));
                  button.setBackground(bg);
                  return button;
              }

              private void updateInterface() {
                  int count = prefs.getInt(KEY_COUNT, 0);
                  boolean enabled = ReminderScheduler.isEnabled(this);

                  statusText.setText(enabled ? "Hourly reminders are ON" : "Hourly reminders are OFF");
                  countText.setText(count + " / " + DAILY_GOAL);
                  progressBar.setProgress(Math.min(count, DAILY_GOAL));
                  reminderButton.setText(enabled ? "Turn off reminders" : "Enable hourly reminders");
              }

              private void resetCountIfNewDay() {
                  String savedDate = prefs.getString(KEY_DATE, "");
                  if (!todayKey().equals(savedDate)) {
                      prefs.edit().putInt(KEY_COUNT, 0).putString(KEY_DATE, todayKey()).apply();
                  }
              }

              private String todayKey() {
                  return new SimpleDateFormat("yyyyMMdd", Locale.US).format(new Date());
              }

              private int dp(int value) {
                  return (int) (value * getResources().getDisplayMetrics().density + 0.5f);
              }
          }
          EOF

      - name: Download Gradle and build APK
        shell: bash
        run: |
          set -e
          curl -L --retry 3 --retry-delay 5 -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.10.2/bin/gradle --no-daemon --stacktrace assembleDebug
          ls -lah app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HydrateHour-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
