          package com.example.hydratehour.reminder
          
          import android.Manifest
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.content.Context
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.os.Build
          import androidx.core.app.NotificationCompat
          import androidx.core.app.NotificationManagerCompat
          import androidx.core.content.ContextCompat
          import com.example.hydratehour.MainActivity
          import com.example.hydratehour.R
          
          object NotificationHelper {
              private const val WATER_NOTIFICATION_ID = 6001
              private const val CHANNEL_ID = "water_reminders"
              private const val CHANNEL_NAME = "Water reminders"
          
              fun ensureChannel(context: Context) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          CHANNEL_ID,
                          CHANNEL_NAME,
                          NotificationManager.IMPORTANCE_DEFAULT
                      ).apply {
                          description = "Hourly reminders to drink water"
                      }
          
                      val manager = context.getSystemService(NotificationManager::class.java)
                      manager.createNotificationChannel(channel)
                  }
              }
          
              fun canPostNotifications(context: Context): Boolean {
                  return Build.VERSION.SDK_INT < Build.VERSION_CODES.TIRAMISU ||
                      ContextCompat.checkSelfPermission(
                          context,
                          Manifest.permission.POST_NOTIFICATIONS
                      ) == PackageManager.PERMISSION_GRANTED
              }
          
              fun showWaterReminder(context: Context) {
                  if (!canPostNotifications(context)) return
          
                  ensureChannel(context)
          
                  val openAppIntent = Intent(context, MainActivity::class.java).apply {
                      flags = Intent.FLAG_ACTIVITY_CLEAR_TOP or Intent.FLAG_ACTIVITY_SINGLE_TOP
                  }
          
                  val contentIntent = PendingIntent.getActivity(
                      context,
                      0,
                      openAppIntent,
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
          
                  val notification = NotificationCompat.Builder(context, CHANNEL_ID)
                      .setSmallIcon(R.drawable.ic_water_drop)
                      .setContentTitle("Time to drink water")
                      .setContentText("Take a small break, sip water, and keep your energy steady.")
                      .setStyle(
                          NotificationCompat.BigTextStyle().bigText(
                              "Take a small break, sip water, and keep your energy steady. Your body will thank you."
                          )
                      )
                      .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                      .setAutoCancel(true)
                      .setContentIntent(contentIntent)
                      .build()
          
                  NotificationManagerCompat.from(context).notify(WATER_NOTIFICATION_ID, notification)
              }
          }
