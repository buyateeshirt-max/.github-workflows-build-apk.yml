name: Build Hydrate Hour APK - One File Setup

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Generate project and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create Android project files
        run: |
          rm -rf app build.gradle.kts settings.gradle.kts
          mkdir -p .
          cat > settings.gradle.kts <<'HYDRATE_FILE_EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "HydrateHour"
          include(":app")
          HYDRATE_FILE_EOF
          mkdir -p .
          cat > build.gradle.kts <<'HYDRATE_FILE_EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.0.21" apply false
          }
          HYDRATE_FILE_EOF
          mkdir -p app
          cat > app/build.gradle.kts <<'HYDRATE_FILE_EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("org.jetbrains.kotlin.plugin.compose")
          }
          
          android {
              namespace = "com.example.hydratehour"
              compileSdk = 35
          
              defaultConfig {
                  applicationId = "com.example.hydratehour"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0.0"
              }
          
              buildFeatures {
                  compose = true
              }
          
              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }
          
          kotlin {
              jvmToolchain(17)
          }
          
          dependencies {
              implementation(platform("androidx.compose:compose-bom:2025.08.00"))
              implementation("androidx.activity:activity-compose:1.10.1")
              implementation("androidx.core:core-ktx:1.15.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.7")
          
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
          
              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          HYDRATE_FILE_EOF
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml <<'HYDRATE_FILE_EOF'
