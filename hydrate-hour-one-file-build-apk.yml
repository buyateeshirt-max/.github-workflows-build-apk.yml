          package com.example.hydratehour.data
          
          import android.content.Context
          import java.time.LocalDate
          
          class HydrationPreferences(context: Context) {
              private val prefs = context.applicationContext.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
          
              val remindersEnabled: Boolean
                  get() = prefs.getBoolean(KEY_REMINDERS_ENABLED, false)
          
              val todayCount: Int
                  get() {
                      ensureTodayIsCurrent()
                      return prefs.getInt(KEY_TODAY_COUNT, 0)
                  }
          
              fun setRemindersEnabled(enabled: Boolean) {
                  prefs.edit().putBoolean(KEY_REMINDERS_ENABLED, enabled).apply()
              }
          
              fun addCup(): Int {
                  ensureTodayIsCurrent()
                  val updatedCount = prefs.getInt(KEY_TODAY_COUNT, 0) + 1
                  prefs.edit()
                      .putInt(KEY_TODAY_COUNT, updatedCount)
                      .putString(KEY_DATE, LocalDate.now().toString())
                      .apply()
                  return updatedCount
              }
          
              fun resetToday(): Int {
                  prefs.edit()
                      .putInt(KEY_TODAY_COUNT, 0)
                      .putString(KEY_DATE, LocalDate.now().toString())
                      .apply()
                  return 0
              }
          
              private fun ensureTodayIsCurrent() {
                  val today = LocalDate.now().toString()
                  val savedDate = prefs.getString(KEY_DATE, null)
                  if (savedDate != today) {
                      prefs.edit()
                          .putString(KEY_DATE, today)
                          .putInt(KEY_TODAY_COUNT, 0)
                          .apply()
                  }
              }
          
              private companion object {
                  const val PREFS_NAME = "hydrate_hour_preferences"
                  const val KEY_REMINDERS_ENABLED = "reminders_enabled"
                  const val KEY_DATE = "date"
                  const val KEY_TODAY_COUNT = "today_count"
              }
          }
